name: Stellar Contracts CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: read-all

env:
  STELLAR_NETWORK: testnet
  STELLAR_RPC_URL: https://soroban-testnet.stellar.org
  STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
  # Soroban currently enforces a ~128KB max WASM contract size; keeping a 100KB
  # budget catches size regressions early while leaving headroom.
  MAX_WASM_SIZE_KB: 100

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: stellar-contracts
        run: cargo audit --deny warnings

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        working-directory: stellar-contracts
        run: cargo tarpaulin --out Xml --timeout 300 --exclude-files tests/* --output-dir coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./stellar-contracts/coverage/cobertura.xml
          flags: stellar-contracts
          fail_ci_if_error: false

  stellar-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Build Stellar contracts
        working-directory: stellar-contracts
        run: cargo build --target wasm32-unknown-unknown --release

      # Soroban WASM contracts have a maximum binary size (currently ~128KB).
      # Fail CI as soon as a release build exceeds the configured budget.
      - name: Check contract WASM size
        working-directory: stellar-contracts
        run: |
          WASM_PATH=$(find target/wasm32-unknown-unknown/release -maxdepth 1 -name "*.wasm" | head -n 1)
          if [ -z "$WASM_PATH" ]; then
            echo "No WASM artifact found" >&2
            exit 1
          fi
          SIZE_KB=$(stat -c%s "$WASM_PATH" | awk '{print int($1/1024)}')
          echo "WASM size: ${SIZE_KB}KB ($WASM_PATH)"
          if [ "$SIZE_KB" -gt "$MAX_WASM_SIZE_KB" ]; then
            echo "ERROR: WASM size ${SIZE_KB}KB exceeds ${MAX_WASM_SIZE_KB}KB limit" >&2
            exit 1
          fi

      - name: Test Stellar contracts
        working-directory: stellar-contracts
        run: cargo test

  deploy-testnet:
    runs-on: ubuntu-latest
    needs: stellar-contracts
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Build contract WASM
        working-directory: stellar-contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Generate deployer keypair
        run: |
          stellar keys generate deployer --network testnet
          stellar keys address deployer

      - name: Fund deployer account via Friendbot
        run: |
          DEPLOYER_ADDRESS=$(stellar keys address deployer)
          curl -s "https://friendbot.stellar.org?addr=${DEPLOYER_ADDRESS}" | jq .

      - name: Deploy contract to testnet
        id: deploy
        run: |
          WASM_PATH=$(find stellar-contracts/target/wasm32-unknown-unknown/release -name "*.wasm" | head -1)
          CONTRACT_ID=$(stellar contract deploy \
            --wasm "$WASM_PATH" \
            --source deployer \
            --network testnet \
            --rpc-url "$STELLAR_RPC_URL" \
            --network-passphrase "$STELLAR_NETWORK_PASSPHRASE")
          echo "contract_id=${CONTRACT_ID}" >> "$GITHUB_OUTPUT"
          echo "Deployed contract: ${CONTRACT_ID}"

      - name: Verify deployment via get_contract_version
        run: |
          stellar contract invoke \
            --id "${{ steps.deploy.outputs.contract_id }}" \
            --source deployer \
            --network testnet \
            --rpc-url "$STELLAR_RPC_URL" \
            --network-passphrase "$STELLAR_NETWORK_PASSPHRASE" \
            -- get_contract_version

      - name: Save contract ID artifact
        run: echo "${{ steps.deploy.outputs.contract_id }}" > contract_id.txt

      - name: Upload contract ID artifact
        uses: actions/upload-artifact@v4
        with:
          name: testnet-contract-id
          path: contract_id.txt
          retention-days: 30

      - name: Notify on deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Testnet deployment failed — ${context.sha.slice(0, 7)}`,
              body: `Deployment to Stellar testnet failed for commit ${context.sha}.\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ci-failure'],
            })
